name: Build A2A Inspector

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-a2a-inspector.yml"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/build-a2a-inspector.yml"
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag, branch, or SHA) of a2aproject/a2a-inspector to build"
        required: false
        default: "main"
        type: string

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/a2a-inspector

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout a2a-inspector repository
        uses: actions/checkout@v4
        with:
          repository: a2aproject/a2a-inspector
          ref: ${{ inputs.ref || 'main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
